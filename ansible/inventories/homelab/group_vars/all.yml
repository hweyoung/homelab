---
# 프로젝트 전역 변수.
# 호스트별로 다르지 않은 값은 전부 여기 모아 둡니다.

# Kubespray / Kubernetes
kubespray_version: "v2.26.0"
kube_version: "v1.30.4"

# Post-Kubespray 노드 taint
prod_taint_key: "pool"
prod_taint_value: "prod"
prod_taint_effect: "NoSchedule"

# Helm CLI
helm_version: "v3.15.4"
helm_install_path: "/usr/local/bin/helm"

# ArgoCD (argocd role 이 helm chart 설치 시 사용)
argocd_namespace: "argocd"
argocd_chart_version: "7.7.0"
argocd_domain: "argocd.homelab.local"
argocd_ingress_class: "traefik"

# GitOps (App-of-Apps 진입 root.yaml).
# monorepo 운영 중이라 ansible/ 의 상대 경로로 argocd/ 를 참조합니다.
# 별도 repo 로 분리한 경우 절대 경로 또는 clone 경로로 바꾸세요.
# 실제 repo URL / revision 은 root.yaml(argocd/) 안에 있고 ansible 은 파일을 그대로 적용합니다.
gitops_root_app_path: "{{ playbook_dir }}/../argocd/bootstrap/root.yaml"
