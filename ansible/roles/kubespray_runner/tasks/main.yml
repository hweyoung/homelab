---
# Kubespray 사전 검증 + cluster.yml 실행 (localhost 에서 실행).
#
# 전제: ./kubespray 에 사전에 체크아웃된 Kubespray 가 있어야 합니다.
# 컨트롤러 부트스트랩 단계의 scripts/sync-kubespray.sh 가 이를 처리합니다.

- name: Kubespray cluster.yml 존재 확인
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/kubespray/cluster.yml"
  register: kubespray_cluster_yml

- name: Kubespray ansible.cfg 존재 확인
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/kubespray/ansible.cfg"
  register: kubespray_ansible_cfg

- name: Kubespray roles 디렉토리 확인
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/kubespray/roles"
  register: kubespray_roles_dir

- name: Kubespray 체크아웃 완전성 검증
  ansible.builtin.assert:
    that:
      - kubespray_cluster_yml.stat.exists | default(false)
      - kubespray_ansible_cfg.stat.exists | default(false)
      - kubespray_roles_dir.stat.isdir | default(false)
    fail_msg: >-
      ./kubespray 가 비어 있거나 불완전합니다.
      저장소 루트에서 ./scripts/prepare-bastion.sh 를 먼저 실행하세요.

- name: Kubespray 체크아웃 태그 조회
  ansible.builtin.command: git describe --tags --exact-match
  args:
    chdir: "{{ playbook_dir }}/kubespray"
  register: kubespray_checkout_tag
  changed_when: false
  failed_when: false

- name: Kubespray 체크아웃 태그가 인벤토리와 일치하는지 검증
  ansible.builtin.assert:
    that:
      - kubespray_version is defined
      - kubespray_checkout_tag.rc == 0
      - kubespray_checkout_tag.stdout == kubespray_version
    fail_msg: >-
      Kubespray 가 {{ kubespray_version }} 에 체크아웃되어 있어야 합니다.
      ./scripts/sync-kubespray.sh 를 실행해 pinned release 로 맞추세요.

- name: kube_version 형식 검증
  ansible.builtin.assert:
    that:
      - kube_version is defined
      - kube_version is string
      - kube_version is match('^v[0-9]+\\.[0-9]+\\.[0-9]+$')
    fail_msg: >-
      group_vars/all.yml 의 kube_version 을 v1.30.4 처럼 v 접두사가 붙은 따옴표
      문자열로 설정하세요.

# 사전 체크: k8s-master 에 admin.conf 가 이미 있으면 클러스터가 부트스트랩된 것으로 간주.
# 강제 재실행이 필요할 땐 `-e kubespray_force=true` 로 실행.
- name: 기존 클러스터(admin.conf) 존재 확인
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: existing_cluster
  delegate_to: k8s-master
  become: true

- name: 클러스터가 이미 부트스트랩되어 있음 — cluster.yml 스킵
  ansible.builtin.debug:
    msg: >-
      k8s-master:/etc/kubernetes/admin.conf 가 이미 존재합니다.
      강제 재실행이 필요하면 `-e kubespray_force=true` 를 추가하세요.
  when:
    - existing_cluster.stat.exists
    - not (kubespray_force | default(false) | bool)

- name: Kubespray cluster.yml 실행
  ansible.builtin.command:
    argv:
      - ansible-playbook
      - -i
      - "{{ playbook_dir }}/inventories/homelab/hosts.yml"
      - cluster.yml
      - --become
  args:
    chdir: "{{ playbook_dir }}/kubespray"
  environment:
    ANSIBLE_CONFIG: "{{ playbook_dir }}/kubespray/ansible.cfg"
    ANSIBLE_INVENTORY: "{{ playbook_dir }}/inventories/homelab/hosts.yml"
    ANSIBLE_ROLES_PATH: "{{ playbook_dir }}/kubespray/roles"
  changed_when: true
  when: >-
    not existing_cluster.stat.exists
    or (kubespray_force | default(false) | bool)
