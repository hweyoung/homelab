---
# argocd ns 에 age 키쌍을 Secret 으로 주입.
# ArgoCD repo-server 의 ksops 플러그인이 이 Secret 을 /home/argocd/.config/sops/age/keys.txt
# 로 마운트해서 *.sops.yaml 을 sync 시점에 복호화합니다.
# 따라서 이 Secret 은 helm deploy(repo-server 기동) 전에 존재해야 마운트가 성공합니다.
#
# 평시에는 idempotent — 같은 내용이면 Secret 이 changed 로 잡히지 않습니다.
# 키 회전 시 새 키를 secrets.yml 에 넣고 다시 실행하면 Secret 이 갱신됩니다.
---
- name: sops_age_private_key 검증
  vars:
    normalized_sops_age_private_key: >-
      {{ sops_age_private_key | default('') | trim }}
  ansible.builtin.assert:
    that:
      - normalized_sops_age_private_key | length > 0
      - normalized_sops_age_private_key != 'CHANGE_ME'
      - normalized_sops_age_private_key is match('^AGE-SECRET-KEY-1')
    fail_msg: >-
      sops_age_private_key가 올바르게 설정되지 않았습니다.
      secrets.yml에 AGE-SECRET-KEY-1로 시작하는 개인키를 설정하고,
      Ansible 실행 시 -e @secrets.yml 옵션으로 전달하세요.
    success_msg: "sops_age_private_key 설정을 확인했습니다."
    quiet: true

- name: argocd 네임스페이스 존재 보장
  ansible.builtin.command: "kubectl create namespace {{ argocd_namespace }}"
  register: ns_create
  failed_when:
    - ns_create.rc != 0
    - "'already exists' not in ns_create.stderr"
  changed_when: ns_create.rc == 0

- name: 현재 sops-age Secret의 keys.txt 추출
  ansible.builtin.command: >-
    kubectl -n {{ argocd_namespace }}
    get secret sops-age
    -o jsonpath='{.data.keys\.txt}'
  register: existing_secret
  changed_when: false
  failed_when: false
  no_log: true

- name: 현재 Secret과 입력 키 비교
  ansible.builtin.set_fact:
    sops_secret_needs_update: >-
      {{
        existing_secret.rc != 0
        or
        (existing_secret.stdout | b64decode | trim)
        !=
        (sops_age_private_key | trim)
      }}
  no_log: true

- name: sops-age Secret 적용
  ansible.builtin.command: "kubectl apply -f -"
  args:
    stdin: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: sops-age
        namespace: {{ argocd_namespace }}
      type: Opaque
      stringData:
        keys.txt: |
          {{ sops_age_private_key | trim | indent(10) }}
  register: sops_apply
  when: sops_secret_needs_update
  changed_when: sops_apply.rc == 0
  no_log: true

- name: sops-age Secret 이미 최신
  ansible.builtin.debug:
    msg: "argocd/sops-age가 이미 입력 키와 동일합니다. 변경 사항이 없습니다."
  when: not sops_secret_needs_update