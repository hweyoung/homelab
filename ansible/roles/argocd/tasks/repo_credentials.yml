---
# ArgoCD 가 private GitHub repo 를 pull 하기 위한 repo credential Secret 주입.
#
# 이 Secret 은 SOPS(*.sops.yaml) 로 관리할 수 없다:
#   root.yaml → repo pull → private 면 credential 필요 → 그 credential 을 repo 에
#   *.sops.yaml 로 두면 repo 를 먼저 받아야 읽을 수 있음(닭-달걀). 그래서 age 키와
#   마찬가지로 ansible 이 out-of-band 로 직접 주입한다.
#
# PAT(argocd_repo_pat) 가 설정된 경우에만 동작하는 opt-in 태스크다. 값이 비어 있으면
# (public repo) 조용히 스킵한다. namespace 는 main.yml 의 age 키 태스크가 이미 보장한다.
#
# 멱등성: 기존 Secret 의 password 와 입력 PAT 가 같으면 changed 로 잡지 않는다.
# PAT 회전 시 secrets.yml 을 갱신하고 다시 실행하면 Secret 이 갱신된다.

- name: repo credential 주입 여부 판정
  ansible.builtin.set_fact:
    argocd_repo_cred_enabled: >-
      {{ argocd_repo_pat is defined
         and (argocd_repo_pat | default('') | trim | length) > 0
         and argocd_repo_pat != 'CHANGE_ME' }}
  no_log: true

- name: PAT 미설정 — repo credential 주입 스킵
  ansible.builtin.debug:
    msg: >-
      argocd_repo_pat 가 secrets.yml 에 없어 repo credential 주입을 스킵합니다.
      private repo 접근이 필요하면 secrets.yml 에 argocd_repo_pat 를 설정하세요.
  when: not argocd_repo_cred_enabled

- name: repo credential 구성 (PAT 설정된 경우만)
  when: argocd_repo_cred_enabled
  block:
    - name: 현재 repo credential Secret 의 password 추출
      ansible.builtin.command: >-
        kubectl -n {{ argocd_namespace }}
        get secret {{ argocd_repo_secret_name }}
        -o jsonpath='{.data.password}'
      register: existing_repo_pat
      changed_when: false
      failed_when: false
      no_log: true

    - name: 현재 Secret 과 입력 PAT 비교 (멱등성)
      ansible.builtin.set_fact:
        argocd_repo_cred_needs_update: >-
          {{ existing_repo_pat.rc != 0
             or (existing_repo_pat.stdout | b64decode) != argocd_repo_pat }}
      no_log: true

    - name: repo credential Secret 적용 (kubectl apply -f -)
      ansible.builtin.command: "kubectl apply -f -"
      args:
        stdin: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: {{ argocd_repo_secret_name }}
            namespace: {{ argocd_namespace }}
            labels:
              argocd.argoproj.io/secret-type: repository
          type: Opaque
          stringData:
            type: git
            url: {{ argocd_repo_url }}
            username: {{ argocd_repo_username }}
            password: {{ argocd_repo_pat }}
      register: repo_cred_apply
      when: argocd_repo_cred_needs_update
      changed_when: repo_cred_apply.rc == 0
      no_log: true

    - name: repo credential 이미 최신 (스킵 알림)
      ansible.builtin.debug:
        msg: "argocd/{{ argocd_repo_secret_name }} 가 이미 입력 PAT 와 동일합니다. 변경 없음."
      when: not argocd_repo_cred_needs_update
