---
# gitops/bootstrap/root.yaml 을 클러스터에 적용해 App-of-Apps 를 발화시킵니다.
# 이미 같은 spec 으로 존재하면 kubectl apply 가 changed=false 로 끝납니다.

- name: 로컬 root.yaml 위치 확인 (controller 측)
  ansible.builtin.stat:
    path: "{{ gitops_root_app_path }}"
  register: root_app_stat
  delegate_to: localhost
  become: false

- name: root.yaml 존재 보장
  ansible.builtin.assert:
    that:
      - root_app_stat.stat.exists
    fail_msg: >-
      {{ gitops_root_app_path }} 를 찾을 수 없습니다.
      group_vars/all.yml 의 gitops_root_app_path 를 확인하세요.

- name: root.yaml 내용 읽기
  ansible.builtin.slurp:
    src: "{{ gitops_root_app_path }}"
  register: root_app_yaml
  delegate_to: localhost
  become: false

- name: root.yaml 을 k8s-master 에 stage
  ansible.builtin.copy:
    content: "{{ root_app_yaml.content | b64decode }}"
    dest: "/home/{{ ansible_user }}/argocd-root.yaml"
    mode: "0644"

- name: kubectl apply -f argocd-root.yaml
  ansible.builtin.command: "kubectl apply -f /home/{{ ansible_user }}/argocd-root.yaml"
  register: root_apply
  changed_when: >-
    'created' in root_apply.stdout
    or 'configured' in root_apply.stdout
