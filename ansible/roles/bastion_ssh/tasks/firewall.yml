---
- name: firewalld 활성 여부 확인
  ansible.builtin.command: systemctl is-active firewalld
  register: firewalld_state
  changed_when: false
  failed_when: false

- name: 커스텀 SSH 포트 firewalld 개방
  ansible.builtin.command: >-
    firewall-cmd --permanent --add-port={{ bastion_ssh_port }}/tcp
  register: firewalld_port_add
  changed_when: "'success' in firewalld_port_add.stdout"
  when: firewalld_state.stdout == 'active'

- name: firewalld 리로드
  ansible.builtin.command: firewall-cmd --reload
  changed_when: false
  when:
    - firewalld_state.stdout == 'active'
    - firewalld_port_add is changed
