---
- name: SSH drop-in 디렉토리 보장
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: SSH 포트 drop-in 설치
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-homelab.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible for homelab access.
      Port {{ bastion_ssh_port }}
      {% if bastion_ssh_keep_port_22 %}
      Port 22
      {% endif %}
  notify: Restart sshd

- name: sshd 설정 검증
  ansible.builtin.command: sshd -t
  changed_when: false
