---
# argocd ns 에 age 키쌍을 Secret 으로 주입.
# ArgoCD repo-server 의 ksops 플러그인이 이 Secret 을 /home/argocd/.config/sops/age/keys.txt
# 로 마운트해서 *.sops.yaml 을 sync 시점에 복호화합니다.
#
# 평시에는 idempotent — 같은 내용이면 Secret 이 changed 로 잡히지 않습니다.
# 키 회전 시 새 키를 secrets.yml 에 넣고 다시 실행하면 Secret 이 갱신됩니다.

- name: sops_age_private_key 검증
  ansible.builtin.assert:
    that:
      - sops_age_private_key is defined
      - sops_age_private_key | length > 0
      - sops_age_private_key != 'CHANGE_ME'
      - "'AGE-SECRET-KEY-' in sops_age_private_key"
    fail_msg: >-
      sops_age_private_key 가 secrets.yml 에 설정되지 않았습니다.
      AGE-SECRET-KEY-... 로 시작하는 키를 입력한 뒤 `-e @secrets.yml` 로 다시 실행하세요.
  no_log: true

- name: argocd 네임스페이스 존재 보장
  ansible.builtin.command: "kubectl create namespace {{ argocd_namespace }}"
  register: ns_create
  failed_when:
    - ns_create.rc != 0
    - "'already exists' not in ns_create.stderr"
  changed_when: ns_create.rc == 0

- name: 현재 sops-age Secret 의 keys.txt 추출
  ansible.builtin.command: >-
    kubectl -n {{ argocd_namespace }}
    get secret sops-age
    -o jsonpath='{.data.keys\.txt}'
  register: existing_secret
  changed_when: false
  failed_when: false
  no_log: true

- name: 현재 Secret 과 입력 키 비교 (멱등성)
  ansible.builtin.set_fact:
    sops_secret_needs_update: >-
      {{ existing_secret.rc != 0
         or (existing_secret.stdout | b64decode) != sops_age_private_key }}
  no_log: true

- name: sops-age Secret 적용 (kubectl apply -f -)
  ansible.builtin.command: "kubectl apply -f -"
  args:
    stdin: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: sops-age
        namespace: {{ argocd_namespace }}
      type: Opaque
      stringData:
        keys.txt: |
          {{ sops_age_private_key | indent(10) }}
  register: sops_apply
  when: sops_secret_needs_update
  changed_when: sops_apply.rc == 0
  no_log: true

- name: sops-age Secret 이미 최신 (스킵 알림)
  ansible.builtin.debug:
    msg: "argocd/sops-age 가 이미 입력 키와 동일합니다. 변경 없음."
  when: not sops_secret_needs_update
