---
# kubectl_path 는 main.yml 에서 미리 등록되어 있습니다.

- name: sudo secure_path 에 kubectl 노출 (심볼릭 링크)
  ansible.builtin.file:
    src: "{{ kubectl_path.stdout }}"
    dest: /usr/bin/kubectl
    state: link
  when: kubectl_path.stdout != '/usr/bin/kubectl'

- name: SSH 사용자 .kube 디렉토리 생성
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"
  when: ansible_user != 'root'

- name: SSH 사용자 kubeconfig 설치
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  when: ansible_user != 'root'
