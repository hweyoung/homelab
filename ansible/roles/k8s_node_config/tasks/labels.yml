---
- name: 풀 라벨 적용 (pool=prod/dev)
  ansible.builtin.command: >-
    {{ kubectl_path.stdout }} label node {{ item }}
    pool={{ hostvars[item].kube_node_pool }} --overwrite
  loop: "{{ groups['k8s_workers'] }}"
  changed_when: false

- name: 플랫폼 티어 라벨 적용 (platform-tier=stable/mutable)
  ansible.builtin.command: >-
    {{ kubectl_path.stdout }} label node {{ item }}
    platform-tier={{ hostvars[item].platform_tier }} --overwrite
  loop: "{{ groups['k8s_workers'] }}"
  changed_when: false

- name: 현재 클러스터 노드 상태 출력
  ansible.builtin.command: "{{ kubectl_path.stdout }} get nodes -o wide --show-labels"
  register: nodes
  changed_when: false

- name: 노드 상태 디버그
  ansible.builtin.debug:
    var: nodes.stdout_lines
