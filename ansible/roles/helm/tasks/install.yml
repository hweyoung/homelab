---
# control-plane 노드에 Helm CLI 바이너리 설치.

- name: Helm 설치 여부 확인
  ansible.builtin.command: "{{ helm_install_path }} version --short"
  register: helm_check
  failed_when: false
  changed_when: false

- name: 설치 상태 출력
  ansible.builtin.debug:
    msg: "{{ 'Helm 이미 설치됨 — ' + helm_check.stdout if helm_check.rc == 0 else 'Helm 미설치 — ' ~ helm_version ~ ' 설치를 시작합니다' }}"

- name: Helm 아카이브 다운로드
  ansible.builtin.get_url:
    url: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
    dest: "/tmp/helm-{{ helm_version }}-linux-amd64.tar.gz"
    mode: "0644"
  when: helm_check.rc != 0

- name: Helm 아카이브 압축 해제
  ansible.builtin.unarchive:
    src: "/tmp/helm-{{ helm_version }}-linux-amd64.tar.gz"
    dest: /tmp
    remote_src: true
    creates: /tmp/linux-amd64/helm
  when: helm_check.rc != 0

- name: Helm 바이너리 설치
  ansible.builtin.copy:
    src: /tmp/linux-amd64/helm
    dest: "{{ helm_install_path }}"
    remote_src: true
    mode: "0755"
  when: helm_check.rc != 0

- name: 설치된 Helm 버전 출력
  ansible.builtin.command: "{{ helm_install_path }} version --short"
  register: helm_version_out
  changed_when: false

- name: Helm 버전 디버그
  ansible.builtin.debug:
    msg: "{{ helm_version_out.stdout }}"
