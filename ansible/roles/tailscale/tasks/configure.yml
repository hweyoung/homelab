---
# subnet router 동작 시 IPv4/IPv6 forwarding 활성화.

- name: IPv4 forwarding 활성화
  ansible.builtin.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    reload: true
  when: tailscale_advertise_routes | length > 0

- name: IPv6 forwarding 활성화
  ansible.builtin.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: "1"
    state: present
    reload: true
  when: tailscale_advertise_routes | length > 0
