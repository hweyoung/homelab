---
- name: 현재 Tailscale 상태 확인
  ansible.builtin.command: tailscale status
  register: tailscale_status
  changed_when: false
  failed_when: false
  no_log: true

- name: tailscale_auth_key 검증
  ansible.builtin.assert:
    that:
      - tailscale_auth_key is defined
      - tailscale_auth_key | length > 0
      - tailscale_auth_key != 'CHANGE_ME'
      - tailscale_auth_key is match('^tskey-auth-')
    fail_msg: >-
      tailscale_auth_key 가 secrets.yml 에 설정되지 않았습니다.
      tskey-auth- 로 시작하는 키를 입력한 뒤 `-e @secrets.yml` 로 다시 실행하세요.
  no_log: true

- name: advertise-routes 형식 검증
  ansible.builtin.assert:
    that:
      - tailscale_advertise_routes is match('^$|^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}(,([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2})*$')
    fail_msg: >-
      tailscale_advertise_routes 는 빈 값이거나 쉼표로 구분된 CIDR 리스트여야 합니다.
      예: 192.168.1.0/24

- name: tailscale up 인자 빌드
  ansible.builtin.set_fact:
    tailscale_up_args: >-
      --auth-key={{ tailscale_auth_key }}
      --hostname={{ inventory_hostname }}
      {{ '--ssh' if tailscale_enable_ssh else '' }}
      {{ '--accept-routes' if tailscale_accept_routes else '' }}
      {{ '--advertise-routes=' ~ tailscale_advertise_routes if tailscale_advertise_routes | length > 0 else '' }}
      {{ '--advertise-exit-node' if tailscale_advertise_exit_node else '' }}
  no_log: true

# 이미 로그인된 상태면 tailscale up 자체를 호출하지 않음 (auth-key 재사용/불필요한 API 호출 방지).
# advertise-routes / hostname / ssh 옵션을 바꿔야 할 땐 노드에서 `tailscale logout` 후
# 부트스트랩을 다시 돌리거나, `tailscale set ...` 로 직접 조정하세요.
- name: Tailnet 조인 (로그아웃 상태일 때만)
  ansible.builtin.command: "tailscale up {{ tailscale_up_args }}"
  when: tailscale_status.rc != 0 or 'Logged out' in tailscale_status.stdout
  no_log: true

- name: Tailscale IPv4 주소 조회
  ansible.builtin.command: tailscale ip -4
  register: tailscale_ip
  changed_when: false

- name: Tailscale 노드 정보 출력
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }} tailscale_ip={{ tailscale_ip.stdout }}"
