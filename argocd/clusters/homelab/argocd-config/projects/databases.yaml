---
# databases AppProject
# - 데이터베이스 AppProject, namespace-scoped 리소스만 허용. cluster-scoped 리소스 생성은 차단
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: databases
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: 데이터베이스 인스턴스 (postgres-dev, postgres-prod) — namespace 스코프 한정

  sourceRepos:
    - https://github.com/hweyoung/homelab.git

  destinations:
    - server: https://kubernetes.default.svc
      namespace: postgres-prod
    - server: https://kubernetes.default.svc
      namespace: postgres-dev

  clusterResourceWhitelist: []

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
