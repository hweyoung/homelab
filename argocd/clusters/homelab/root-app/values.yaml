# App of Apps 패턴을 위한 root ArgoCD Application 렌더링 입력값.

# 모든 하위 Application 이 공유하는 GitOps 소스 기본값.
global:
  repoURL: https://github.com/hweyoung/homelab.git
  targetRevision: main

# syncPolicyRef 로 참조하는 명명된 sync 정책.
# 각 Application 은 syncPolicyRef 로 아래 키 중 하나를 고릅니다.
syncPolicies:
  # 수동 sync (기본).
  manual:
    syncOptions:
      - ApplyOutOfSyncOnly=true
  # 자동 sync — prune + selfHeal.
  auto:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m

# root-app에서 관리하는 하위 Application 목록.
applications:
  # --- Helm 타입 예시 ---
  - name: podinfo
    group: platform
    project: default
    namespace: podinfo
    type: helm
    wave: 0
    path: argocd/apps/podinfo
    createNamespace: true
    syncPolicyRef: auto
    helm:
      valueFiles:
        - values.yaml
    annotations:
      example.homelab/owner: platform-team

  # --- Kustomize 타입 예시 ---
  - name: echo
    group: platform
    project: default
    namespace: echo
    type: kustomize
    wave: 1
    path: argocd/apps/echo
    createNamespace: true
    syncPolicyRef: auto
