# ====================================
# root-app (App-of-Apps) 의 values.yaml
# ====================================
global:
  repoURL: https://github.com/hweyoung/homelab.git
  targetRevision: main

# ==============
# syncPolicy
# ==============
syncPolicies:
  # 수동 sync
  manual:
    syncOptions:
      - ApplyOutOfSyncOnly=true
  # 자동 sync — prune + selfHeal
  auto:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m

# ==================
# Application 목록
# ==================
applications:
  # --- argocd-config (부트스트랩) ---
  - name: argocd-config
    namespace: argocd
    project: default
    type: directory
    wave: -10
    path: gitops/clusters/homelab/argocd-config
    syncPolicyRef: auto

